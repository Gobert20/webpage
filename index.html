<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bienvenido a mi pagina</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto&display=swap');

        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ff6ec4, #7873f5, #42e695, #3bb2b8);
            background-size: 400% 400%;
            animation: gradientAnim 15s ease infinite;
            color: #fff;
            text-align: center;
        }

        @keyframes gradientAnim {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .contenedor {
            background: rgba(0, 0, 0, 0.5);
            padding: 50px 40px;
            border-radius: 20px;
            max-width: 650px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .contenedor:hover {
            transform: scale(1.05);
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 50px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        p {
            font-size: 20px;
            margin-bottom: 30px;
            line-height: 1.5;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
        }

        button {
            background: linear-gradient(45deg, #ff6ec4, #7873f5);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        button:hover {
            background: linear-gradient(45deg, #42e695, #3bb2b8);
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>👋 Tachy, sos reverendo PUTO </h1>
        <p>Gracias por visitar mi sitio web.</p>
        <button onclick="alert('¡Gracias por visitar mi página!')">Presiona</button>
    </div>
</body>
</html>
