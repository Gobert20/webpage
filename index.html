<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bienvenido a mi página</title>
    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            text-align:center;
        }

        .contenedor{
            background: rgba(0,0,0,0.35);
            padding:40px;
            border-radius:15px;
            max-width:600px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        h1{
            font-size:42px;
            margin-bottom:10px;
        }

        p{
            font-size:18px;
            margin-bottom:25px;
        }

        button{
            background:white;
            color:#333;
            border:none;
            padding:12px 25px;
            font-size:16px;
            border-radius:8px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#f0f0f0;
            transform:scale(1.05);
        }
    </style>
</head>

<body>

<div class="contenedor">
    <h1>👋 Bienvenido a mi página</h1>
    <p>Gracias por visitar mi sitio web. Aquí encontrarás contenido interesante, proyectos y más.</p>
    <button onclick="alert('¡Gracias por visitar mi página!')">Explorar</button>
</div>

</body>
</html>
